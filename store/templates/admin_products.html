{% extends 'base.html' %}

{% block content %}

<h2>Manage Products</h2>

<a href="/add-product/" class="btn btn-success mb-3">Add Product</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>

{% for product in products %}

<tr>
<td>{{product.id}}</td>
<td>{{product.name}}</td>
<td>{{product.price}}</td>
<td>{{product.stock}}</td>

<td>
<a href="/edit-product/{{product.id}}" class="btn btn-warning">Edit</a>
<a href="/delete-product/{{product.id}}" class="btn btn-danger">Delete</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
