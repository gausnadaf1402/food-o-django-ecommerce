{% extends 'base.html' %}

{% block content %}

<h2>Your Orders</h2>

<table class="table table-bordered">

<tr>

<th>Order ID</th>
<th>Total</th>
<th>Date</th>

</tr>

{% for order in orders %}

<tr>

<td>{{ order.id }}</td>

<td>₹{{ order.total_price }}</td>

<td>{{ order.created_at }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
