<!DOCTYPE html>
<html>
<head>

<title>FOOD-O Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f3d2e,#1c6b4f);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.payment-card{
background:rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border-radius:20px;
padding:40px;
width:400px;
text-align:center;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.payment-card h2{
font-weight:bold;
margin-bottom:20px;
}

.amount{
font-size:28px;
font-weight:bold;
color:#00ffae;
margin-bottom:25px;
}

.secure{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

.pay-btn{
width:100%;
padding:12px;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.pay-btn:hover{
transform:scale(1.05);
}

.cancel-btn{
margin-top:10px;
width:100%;
border-radius:10px;
}

.lock{
font-size:20px;
margin-right:6px;
}

</style>

</head>

<body>

<div class="payment-card">

<h2>💳 FOOD-O Secure Payment</h2>

<div class="secure">
🔒 Your payment is secured with encryption
</div>

<div class="amount">
₹{{ total }}
</div>

<button class="btn btn-success pay-btn" onclick="successPayment()">
💰 Pay Now
</button>

<button class="btn btn-outline-light cancel-btn" onclick="cancelPayment()">
Cancel Payment
</button>

</div>

<script>

function successPayment(){
alert("Payment Successful ✅")
window.location.href="/payment-success/"
}

function cancelPayment(){
alert("Payment Cancelled ❌")
window.location.href="/cart/"
}

</script>

</body>
</html>
